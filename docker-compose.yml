# RhineTV — self-hosted stack for TrueNAS (or any Docker host)
#
# Pulls the pre-built image from GHCR (built by .github/workflows/docker.yml)
# and lets Watchtower auto-update it whenever you push to `main` in GitHub.
#
# 1. Edit the labels below: change `ghcr.io/<your-github-user>/rhinetv` to
#    your actual repo owner.
# 2. Create a `.env` next to this file (see .env.example after you generate one).
# 3. `docker compose up -d`

services:
  rhinetv:
    image: ghcr.io/paulgsr/rhinetv:latest
    container_name: rhinetv
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      # Filesystem scanner — every folder under MEDIA_ROOT that contains
      # `master.m3u8` becomes a movie in the library.
      MEDIA_ROOT: /media
      # URL your reverse proxy / static server exposes those HLS files at
      # (must be reachable from the browser). If RhineTV itself serves /media,
      # leave as-is; otherwise point at your nginx / caddy media host.
      PUBLIC_MEDIA_BASE_URL: /media
      # Optional: TMDB for auto-filled posters / overviews / runtime / genres.
      # TMDB_API_KEY: ${TMDB_API_KEY}
      # Jellyseerr integration (drives Discover + Coming soon):
      # JELLYSEERR_URL: ${JELLYSEERR_URL}
      # JELLYSEERR_API_KEY: ${JELLYSEERR_API_KEY}
    volumes:
      # Mount your HLS-prepared movies read-only. The folder layout is:
      #   /mnt/tank/media/hls/Inception (2010)/master.m3u8
      #   /mnt/tank/media/hls/Sintel (2010)/master.m3u8
      - /mnt/tank/media/hls:/media:ro
    # env_file:
    #   - .env
    labels:
      # Opt this container in to Watchtower updates
      com.centurylinklabs.watchtower.enable: "true"


  watchtower:
    image: containrrr/watchtower:latest
    container_name: rhinetv-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - --label-enable        # only touch containers with the label above
      - --cleanup             # remove old images after updating
      - --interval=300        # check every 5 minutes
