# RhineTV — self-hosted stack for TrueNAS (or any Docker host)
#
# Pulls the pre-built image from GHCR (built by .github/workflows/docker.yml)
# and lets Watchtower auto-update it whenever you push to `main` in GitHub.
#
# 1. Edit the labels below: change `ghcr.io/<your-github-user>/rhinetv` to
#    your actual repo owner.
# 2. Create a `.env` next to this file (see .env.example after you generate one).
# 3. `docker compose up -d`

services:
  rhinetv:
    image: ghcr.io/paulgsr/rhinetv:latest
    container_name: rhinetv
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      # Filesystem scanner — every folder under MEDIA_ROOT that contains
      # `master.m3u8` becomes a movie in the library.
      MEDIA_ROOT: /media
      # URL your reverse proxy / static server exposes those HLS files at
      # (must be reachable from the browser). If RhineTV itself serves /media,
      # leave as-is; otherwise point at your nginx / caddy media host.
      PUBLIC_MEDIA_BASE_URL: /media
      # Drop raw video files here — the auto-encoder picks them up, transcodes
      # to HLS into MEDIA_ROOT, and marks each source with a `.processed`
      # sidecar so it isn't re-encoded. Remove the sidecar to re-run.
      INBOX_ROOT: /inbox
      INBOX_POLL_MS: "30000"
      # Which renditions to build (space-separated: 1080p 720p 480p). The
      # encoder skips renditions taller than the source.
      RENDITIONS: "1080p 720p 480p"
      SEG_SECONDS: "6"
      # Hardware-accelerated transcoding. Options:
      #   nvenc  — NVIDIA GPU (e.g. GTX 1060). Also uncomment the `deploy.
      #            resources.reservations.devices` block below and make sure
      #            nvidia-container-toolkit is installed on the host.
      #   qsv    — Intel iGPU QuickSync. Pass through `/dev/dri`.
      #   vaapi  — AMD / Intel via VA-API. Pass through `/dev/dri`.
      #   none   — CPU only (libx264). Default.
      HWACCEL: nvenc
      # Tell the NVIDIA runtime which GPUs + capabilities to expose.
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,video,utility
      # Optional: TMDB for auto-filled posters / overviews / runtime / genres.
      # TMDB_API_KEY: ${TMDB_API_KEY}
      # Jellyseerr integration (drives Discover + Coming soon):
      # JELLYSEERR_URL: ${JELLYSEERR_URL}
      # JELLYSEERR_API_KEY: ${JELLYSEERR_API_KEY}
    # GPU passthrough — requires nvidia-container-toolkit on the host.
    # TrueNAS Scale: install the "NVIDIA drivers" system app first.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, video]
    volumes:
      # HLS output — served to browsers. Encoder writes here.
      - /mnt/tank/media/hls:/media
      # Raw inbox — drop new movies here. Read-write so the encoder can write
      # `.processed` / `.failed` sidecar markers.
      - /mnt/tank/media/raw:/inbox
    # env_file:
    #   - .env
    labels:
      # Opt this container in to Watchtower updates
      com.centurylinklabs.watchtower.enable: "true"



  watchtower:
    image: containrrr/watchtower:latest
    container_name: rhinetv-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - --label-enable        # only touch containers with the label above
      - --cleanup             # remove old images after updating
      - --interval=300        # check every 5 minutes
